<!DOCTYPE html>
<html>
<head>
    <title>Test Shortest Path</title>
</head>
<body>
    <h1>Testing Shortest Path Weight Calculation</h1>
    <div id="output"></div>
    <script>
        // 模拟图数据
        const graph = {
            "A": {"B": 5.0, "C": 3.0},
            "B": {"D": 2.0},
            "C": {"D": 4.0},
            "D": {}
        };
        
        const start = "A";
        const end = "D";
        
        // 模拟用户的 solve 函数（简单的 BFS）
        function solve(graph, start, end) {
            const queue = [start];
            const visited = new Set([start]);
            const prev = {};
            
            while (queue.length > 0) {
                const u = queue.shift();
                if (u === end) break;
                
                for (const v in graph[u]) {
                    if (!visited.has(v)) {
                        visited.add(v);
                        prev[v] = u;
                        queue.push(v);
                    }
                }
            }
            
            if (!(end in prev) && end !== start) {
                return [];
            }
            
            const path = [];
            let node = end;
            while (node in prev) {
                path.unshift(node);
                node = prev[node];
            }
            path.unshift(start);
            return path;
        }
        
        // 测试
        const userPath = solve(graph, start, end);
        console.log("User path:", userPath);
        
        // 模拟 Python 代码的权重计算逻辑
        let userWeight = -1.0;
        if (Array.isArray(userPath) && userPath.length >= 2) {
            // 验证起点和终点
            if (String(userPath[0]) !== start) {
                console.log(`[DEBUG] Path does not start at start node: '${userPath[0]}' != '${start}'`);
            } else if (String(userPath[userPath.length - 1]) !== end) {
                console.log(`[DEBUG] Path does not end at end node: '${userPath[userPath.length - 1]}' != '${end}'`);
            } else {
                // 计算权重
                let weight = 0.0;
                let valid = true;
                for (let i = 0; i < userPath.length - 1; i++) {
                    const u = String(userPath[i]);
                    const v = String(userPath[i + 1]);
                    if (u in graph) {
                        if (v in graph[u]) {
                            const edgeWeight = parseFloat(graph[u][v]);
                            weight += edgeWeight;
                            console.log(`[DEBUG] Edge ${u} -> ${v}: weight = ${edgeWeight}`);
                        } else {
                            console.log(`[DEBUG] Edge not found: ${u} -> ${v}`);
                            valid = false;
                            break;
                        }
                    } else {
                        console.log(`[DEBUG] Node ${u} not found in graph`);
                        valid = false;
                        break;
                    }
                }
                userWeight = valid ? weight : -1.0;
                console.log(`[DEBUG] User weight: ${userWeight}, valid: ${valid}`);
            }
        }
        
        document.getElementById('output').innerHTML = `
            <p><strong>User Path:</strong> ${JSON.stringify(userPath)}</p>
            <p><strong>User Weight:</strong> ${userWeight}</p>
            <p><strong>Expected:</strong> Path should be ["A", "B", "D"] or ["A", "C", "D"]</p>
            <p><strong>Expected Weight:</strong> 7.0 (A->B->D) or 7.0 (A->C->D)</p>
        `;
    </script>
</body>
</html>
